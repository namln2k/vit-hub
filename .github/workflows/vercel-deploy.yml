name: Quality Checks and Vercel Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.invalid
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      NEXT_PUBLIC_GOOGLE_ONE_TAP_ENABLED: 'false'
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ''
      R2_ACCOUNT_ID: ci-placeholder
      R2_ACCESS_KEY_ID: ci-placeholder
      R2_SECRET_ACCESS_KEY: ci-placeholder
      R2_BUCKET_NAME: vit-hub-ci
      R2_PUBLIC_BASE_URL: https://ci-placeholder.invalid
      R2_FREE_TIER_MAX_UPLOAD_BYTES: '1048576'
      R2_POST_IMAGE_MAX_UPLOAD_BYTES: '5242880'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Trigger Vercel deployment
    needs: quality
    if: github.event_name == 'push' && github.event.head_commit.author.username != 'namln2k'
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel deploy hook
        run: curl --fail-with-body --silent --show-error --request POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
