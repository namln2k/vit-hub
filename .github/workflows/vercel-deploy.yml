name: Trigger Vercel Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.event.head_commit.author.username != 'namln2k'
    runs-on: ubuntu-latest
    steps:
      - name: Send POST Request to Vercel Hook
        run: |
          curl --fail-with-body --silent --show-error --request POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
