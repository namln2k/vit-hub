services:
  app:
    image: node:24.16.0-bookworm
    working_dir: /app
    command: sh -c "npm install && node node_modules/next/dist/bin/next dev --hostname 0.0.0.0"
    ports:
      - '3000:3000'
    env_file:
      - ${APP_ENV_FILE:-.env}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      DOCKER_CONTAINER: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
      WATCHPACK_POLLING: 'true'
    volumes:
      - .:/app
      - ${APP_ENV_FILE:-.env}:/app/.env.local:ro
      - node_modules:/app/node_modules
      - next_cache:/app/.next

volumes:
  node_modules:
  next_cache:
